    - data:
        code: "function main(inputs) {\n  // 1) Be flexible about how `data` arrives\n\
          \  let payload = inputs.data;\n  if (typeof payload === \"string\") {\n\
          \    try { payload = JSON.parse(payload); } catch { payload = {}; }\n  }\n\
          \n  // 2) Normalize to the array of { ventures: [...] }\n  const groups\
          \ = Array.isArray(payload?.data)\n    ? payload.data\n    : (Array.isArray(payload)\
          \ ? payload : []);\n\n  // 3) Flatten all ventures\n  const allVentures\
          \ = groups.flatMap(g =>\n    Array.isArray(g?.ventures) ? g.ventures : []\n\
          \  );\n\n  // 4) Keep only scored items and decorate with index for stable\
          \ tie-breaking\n  const scored = allVentures\n    .filter(v => v?.score\
          \ && !Number.isNaN(Number(v.score.overall)))\n    .map((v, i) => ({ ...v,\
          \ __i: i }));\n\n  // 5) Sort by overall desc, then market_viability, then\
          \ strategic_fit, then original order\n  scored.sort((a, b) => {\n    const\
          \ byOverall = Number(b.score.overall) - Number(a.score.overall);\n    if\
          \ (byOverall) return byOverall;\n    const byMV = Number(b.score.market_viability\
          \ ?? -Infinity) - Number(a.score.market_viability ?? -Infinity);\n    if\
          \ (byMV) return byMV;\n    const bySF = Number(b.score.strategic_fit ??\
          \ -Infinity) - Number(a.score.strategic_fit ?? -Infinity);\n    if (bySF)\
          \ return bySF;\n    return a.__i - b.__i; // stable\n  });\n\n  // 6) Take\
          \ top 10 and restore original shape\n  const top = scored.slice(0, 10).map(({\
          \ __i, ...v }) => v);\n\n  // Return ONLY the same form as input\n  return\
          \ {\n    data: top.map(v => ({ ventures: [v] }))\n  };\n}\n"
