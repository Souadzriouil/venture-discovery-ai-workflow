    - data:
        code: "function main({ query, resp }) {\n  // SerpAPI returns an array; normalize\
          \ to one object\n  const body = Array.isArray(resp) ? (resp[0] || {}) :\
          \ (resp || {});\n  const take = (arr, n = 5) => (Array.isArray(arr) ? arr.slice(0,\
          \ n) : []);\n\n  const organic = take(body.organic_results, 5).map(o =>\
          \ ({\n    position: o.position,\n    title: o.title,\n    link: o.link,\n\
          \    source: o.source || o.displayed_link || \"\",\n    snippet: o.snippet\
          \ || \"\"\n  }));\n\n  const related = take(body.related_questions, 5).map(r\
          \ => ({\n    question: r.question,\n    link: r.link,\n    snippet: r.snippet\
          \ || \"\"\n  }));\n\n  const imgs = body.images_results || body.images ||\
          \ [];\n  const images = take(imgs, 4).map(i => ({\n    title: i.title ||\
          \ \"\",\n    link: i.link || i.source || \"\",\n    image: i.thumbnail ||\
          \ i.original || i.image || \"\"\n  }));\n\n  // links to scrape next\n \
          \ const urls = Array.from(new Set(\n    organic.map(o => o.link).concat(related.map(r\
          \ => r.link))\n  )).filter(u => /^https?:\\/\\//i.test(u));\n\n  // IMPORTANT:\
          \ return an OBJECT (not an array)\n  return {\n    result_final: { query:\
          \ query || \"\", organic, related, images },\n    urls\n  };\n}\n"
