          \  const cleaned = (urls || []).map(s => {\n    const base = stripFrag(s);\n\
          \    try {\n      const u = new URL(base);\n      // Remove common tracking\
          \ params\n      ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','ved','sa','gws_rd','oc','ei','usg','oq']\n\
          \        .forEach(k => u.searchParams.delete(k));\n      return u.toString();\n\
          \    } catch {\n      return base;\n    }\n  });\n  return { urls: Array.from(new\
          \ Set(cleaned)) };\n}\n"
